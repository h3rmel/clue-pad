<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Anti-FOUC: aplica o tema antes do React montar e antes do primeiro paint.
      // Lê a mesma chave que src/lib/storage.ts (clue-pad:theme:v1) e resolve
      // 'system' via prefers-color-scheme. Mantenha as cores em sincronia com
      // THEME_COLOR em src/state/theme.tsx.
      (function () {
        try {
          var pref = localStorage.getItem("clue-pad:theme:v1");
          if (pref !== "light" && pref !== "dark") pref = "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0a0a0a" : "#ffffff");
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Cartilha digital offline para o jogo de tabuleiro Detetive." />
    <title>clue-pad — Detetive</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
